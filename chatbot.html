<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health Sathi – PIA System</title>
  <style>
    :root{
      --primary:#667eea; --secondary:#764ba2; --success:#2ed573; --danger:#e43f5a; --light:#f8f9fa;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      height:98vh; display:flex; align-items:center; justify-content:center; padding:12px;
    }
    .container{
      width:100%; max-width:520px; height:95vh; background:#fff; border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.25); display:flex; flex-direction:column; overflow:hidden;
    }
    .header{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff; padding:18px; font-weight:700; text-align:center; font-size:1.15rem;
    }
    .chat-box{
      flex:1; background:var(--light); padding:18px; overflow-y:auto; display:flex; flex-direction:column; gap:14px;
    }
    .message{ max-width:80%; padding:12px 14px; border-radius:14px; line-height:1.4; font-size:14.5px; word-wrap:break-word; white-space:pre-wrap;}
    .bot{ background:#e8f1ff; align-self:flex-start; color:#111 }
    .user{ background:var(--primary); color:#fff; align-self:flex-end; }
    .warning{ background:var(--danger) !important; color:#fff; font-weight:700; }
    .quick-replies{ padding:14px; background:#fff; border-top:1px solid #eee; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .qr-btn{ padding:10px 16px; border-radius:22px; border:2px solid var(--primary); background:#fff; color:var(--primary); cursor:pointer; font-weight:600; }
    .qr-btn:hover{ background:var(--primary); color:#fff; transform:translateY(-3px); }
    .input-area{ display:flex; gap:8px; padding:12px; background:#fff; border-top:1px solid #eee; align-items:center; }
    #userInput{ flex:1; padding:12px 14px; border-radius:20px; border:1px solid #ddd; outline:none; font-size:14px; }
    .icon-btn{ width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
    #voiceBtn{ background:#f1f3f6; color:var(--primary); }
    #readBtn{ background:var(--success); color:#fff; }
    #sendBtn{ background:var(--primary); color:#fff; border:none; padding:0 14px; border-radius:10px; height:44px; cursor:pointer; font-size:16px; }
    .meta{ font-size:12px; color:#666; margin-top:6px; }
  </style>
</head>

      <input id="userInput" placeholder="Type your message..." aria-label="Chat input" />
      <button id="sendBtn">➤</button>
      <button id="readBtn" class="icon-btn" title="Read last reply">🔊</button>
    </div>
  </div>

  <div class="floating-phone-icon">
    <a href="tel:+919876543210" title="Call Hospital">
      📞
    </a>
  </div>

    .floating-phone-icon {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      animation: pulse 2s infinite;
    }
    .floating-phone-icon a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      color: white;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }
    .floating-phone-icon a:hover {
      transform: scale(1.15);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .back-btn {
      display: inline-flex;

      gap: 10px;
      padding: 14px 35px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

      text-decoration: none;

      font-weight: 700;

    }

    .back-btn:hover {
      transform: translateX(-50%) translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
    }
  </style>

    function addMessage(textContent, type='bot', warning=false){
      const el = document.createElement('div');
      el.className = `message ${type} ${warning ? 'warning' : ''}`;
      el.textContent = textContent;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      if(type==='bot'){
        lastBotText = textContent;
      }
    }

    function showQuick(list){
      quickReplies.innerHTML = '';
      (list||[]).forEach(item=>{
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = item;
        btn.onclick = ()=> handleInput(item);
        quickReplies.appendChild(btn);
      });
    }

    /* ===========================
       Input / Flow logic
       =========================== */
    function handleInput(raw){
      if(!raw) return;
      const input = raw.trim();
      addMessage(input, 'user');

      if(state.stage === 'language'){
        if(input.includes('English')) state.lang = 'en';
        else if(input.includes('हिंदी')) state.lang = 'hi';
        else if(input.includes('ಕನ್ನಡ')) state.lang = 'kn';
        else { addMessage("Please select: English / हिंदी / ಕನ್ನಡ"); return; }

        state.stage = 'main';
        addMessage(text[state.lang].welcome);
        showQuick(text[state.lang].mainMenu);
        return;
      }

      if(state.stage === 'main'){
        if(input.includes("Check") || input.includes("लक्षण") || input.includes("ಲಕ್ಷಣ")){
          state.stage = 'symptom';
          addMessage(text[state.lang].selectSymptom);
          showQuick(symptomsByLang[state.lang]);
          return;
        }

        if(input.includes("Appointment") || input.includes("अपॉइंटमेंट") || input.includes("ಅಪಾಯಿಂಟ್")){
          addMessage(text[state.lang].appointment);
          showQuick(text[state.lang].mainMenu);
          return;
        }

        if(input.includes("Emergency") || input.includes("आपातकालीन") || input.includes("ತುರ್ತು")){
          addMessage(text[state.lang].emergency, 'bot', true);
          showQuick(text[state.lang].mainMenu);
          return;
        }

        addMessage("Please choose from the menu.");
        showQuick(text[state.lang].mainMenu);
        return;
      }

      if(state.stage === 'symptom'){
        state.symptom = symptomToKey[state.lang][input];
        if(!state.symptom){
          addMessage(text[state.lang].symptomError);
          showQuick(symptomsByLang[state.lang]);
          return;
        }
        state.stage = 'duration';
        addMessage(text[state.lang].selectDuration);
        showQuick(text[state.lang].durations);
        return;
      }

      if(state.stage === 'duration'){
        // Map duration input to key
        let durationKey = "any";
        if(input.includes("1-3") || input.includes("दिन") && input.includes("1-3") || input.includes("ದಿನ") && input.includes("1-3")){
          durationKey = "1-3 days";
        } else if(input.includes("3-7") || input.includes("दिन") && input.includes("3-7") || input.includes("ದಿನ") && input.includes("3-7")){
          durationKey = "3-7 days";
        } else if(input.includes("1-2") && (input.includes("week") || input.includes("सप्ताह") || input.includes("ವಾರ"))){
          durationKey = "1-2 weeks";
        } else if(input.includes("More") || input.includes("अधिक") || input.includes("ಹೆಚ್ಚು")){
          durationKey = "any";
        }

        // Get the record for this symptom and duration
        let rec = database[state.symptom][durationKey] || database[state.symptom]["any"];
        let langRec = rec[state.lang] || rec.en;
        
        let response = text[state.lang].diagnosis + langRec.diagnosis;
        
        if(langRec.home && langRec.home.length > 0){
          response += "\n\n" + text[state.lang].homeRemedies + "\n• " + langRec.home.join("\n• ");
        }
        
        if(langRec.medicines && langRec.medicines.length > 0){
          response += "\n\n" + text[state.lang].medicines + "\n• " + langRec.medicines.join("\n• ");
        }
        
        if(langRec.serious){
          response += "\n\n⚠️ " + langRec.serious;
        }
        
        response += "\n\n" + text[state.lang].thankYou;
        
        addMessage(response);
        
        // Reset to main menu
        state.stage = 'main';
        state.symptom = null;
        state.duration = null;
        setTimeout(()=>{
          addMessage(text[state.lang].helpMore);
          showQuick(text[state.lang].mainMenu);
        }, 1500);
        return;
      }
    }

    /* ===========================
       Voice + TTS
       =========================== */
    let recognition;
    function setupRecognition(){
      if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
        const R = window.webkitSpeechRecognition || window.SpeechRecognition;
        recognition = new R();
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.lang = state.lang === 'hi' ? 'hi-IN' : state.lang === 'kn' ? 'kn-IN' : 'en-US';
        recognition.onresult = e => {
          if(e.results && e.results[0]){
            handleInput(e.results[0][0].transcript);
          }
        };
        recognition.onerror = e => {
          console.error('Speech recognition error:', e.error);
          addMessage("Voice input not recognized. Please try again or type your message.");
        };
      }
    }

    voiceBtn.onclick = ()=> {
      if(recognition){
        recognition.lang = state.lang === 'hi' ? 'hi-IN' : state.lang === 'kn' ? 'kn-IN' : 'en-US';
        recognition.start();
      } else {
        addMessage("Voice input not supported on this browser. Please type your message.");
      }
    };

    readBtn.onclick = ()=>{
      if(!lastBotText) return;
      const u = new SpeechSynthesisUtterance(lastBotText);
      u.lang = state.lang === 'hi' ? 'hi-IN' : state.lang === 'kn' ? 'kn-IN' : 'en-US';
      speechSynthesis.speak(u);
    };

    sendBtn.onclick = ()=>{
      handleInput(userInput.value);
      userInput.value = '';
    };

    userInput.addEventListener('keypress', e=>{
      if(e.key === 'Enter'){
        handleInput(userInput.value);
        userInput.value = '';
      }
    });

    /* ===========================
       Start
       =========================== */
    function start(){
      setupRecognition();

      const welcomeMsg = text.en.selectLang + "\n" + text.hi.selectLang + "\n" + text.kn.selectLang;

      addMessage(welcomeMsg);
      showQuick(["English","हिंदी","ಕನ್ನಡ"]);
    }

    start();
  </script>
</body>
</html>
