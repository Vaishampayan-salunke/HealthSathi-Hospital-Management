<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy - CityCare Hospital</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pharmacy-page">

  <!-- Navbar -->
  <header class="navbar">
    <h2>🏥 HealthSathi </h2>
    <nav>
      <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
      <a href="appointments.html" data-i18n="appointments">Appointments</a>
      <a href="departments.html" data-i18n="departments">Departments</a>
      <a href="pharmacy.html" class="active" data-i18n="pharmacy">Pharmacy</a>
      <a href="lab.html" data-i18n="lab">Lab</a>
      <a href="billing.html" data-i18n="billing">Billing</a>
      <a href="chatbot.html" data-i18n="chatbot">AI Chatbot</a>
      <a href="nearbyhospital.html" data-i18n="nearby_hospitals">Nearby Hospitals</a>
      <a href="emergency.html" class="emergency-btn" data-i18n="emergency">🚨 Emergency</a>
      <a href="index.html" data-i18n="logout">Logout</a>
    </nav>
  </header>

  <main class="pharmacy">
    <h1 data-i18n="pharmacy_title">💊 Pharmacy</h1>
    <p class="subtitle" data-i18n="pharmacy_subtitle">Browse and order medicines</p>

    <!-- Search -->
    <input type="text" id="searchBar" data-i18n="search_medicines" placeholder="🔍 Search medicines..." class="search-bar">

    <!-- Medicine Grid -->
    <div class="medicine-grid" id="medicineGrid"></div>

    <!-- Cart -->
    <section class="cart">
      <h2 data-i18n="your_cart">🛒 Your Cart</h2>
      <ul id="cartList"></ul>
      <p><strong data-i18n="total">Total</strong>: ₹<span id="cartTotal">0</span></p>
      <div class="cart-buttons">
        <button class="glow-btn" onclick="checkout()" data-i18n="checkout">Checkout → Billing</button>
      </div>
    </section>
  </main>

  <script>
    const medicines = [
      {name:"Paracetamol", price:25, img:"img/medicines/paracetamol.jpg", desc:"Used for fever and mild pain relief."},
      {name:"Augmentin", price:120, img:"img/medicines/augmentin.jpg", desc:"Antibiotic for bacterial infections."},
      {name:"Insulin", price:350, img:"img/medicines/insulin.jpg", desc:"Essential for diabetes management."},
      {name:"Vitamin D", price:50, img:"img/medicines/vitamin-d.jpg", desc:"Supports bone and immune health."},
      {name:"Amoxicillin", price:80, img:"img/medicines/amoxicillin.jpg", desc:"Broad-spectrum antibiotic."},
      {name:"Cough Syrup", price:90, img:"img/medicines/cough-syrup.jpg", desc:"Relieves cough and throat irritation."},
      {name:"Aspirin", price:40, img:"img/medicines/aspirin.jpg", desc:"Pain reliever, reduces fever & inflammation."},
      {name:"Cetirizine", price:30, img:"img/medicines/cetirizine.jpg", desc:"Allergy relief (sneezing, runny nose)."},
      {name:"Metformin", price:200, img:"img/medicines/metformin.jpg", desc:"Controls blood sugar in type 2 diabetes."},
      {name:"Pantoprazole", price:150, img:"img/medicines/pantoprazole.jpg", desc:"Reduces stomach acid & heartburn."},
      {name:"Calcium Tablets", price:110, img:"img/medicines/calcium.jpg", desc:"Strengthens bones & teeth."},
      {name:"ORS Solution", price:20, img:"img/medicines/ors.jpg", desc:"Restores hydration during diarrhea/fever."}
    ];

    const grid = document.getElementById("medicineGrid");
    const cartList = document.getElementById("cartList");
    const cartTotal = document.getElementById("cartTotal");

    let cart = [];
    let selectedItemIndex = null; // Track selected item
    // Load existing cart from localStorage (so billing page can read it)
    try {
      const saved = localStorage.getItem('pharmacyCart');
      if (saved) cart = JSON.parse(saved) || [];
    } catch (e) {
      console.warn('Failed to parse saved pharmacyCart', e);
      cart = [];
    }

    // Render Medicines
    function renderMedicines(list) {
      grid.innerHTML = "";
      list.forEach(med => {
        const card = document.createElement("div");
        card.className = "medicine-card";
        card.innerHTML = `
          <img src="${med.img}" alt="${med.name}">
          <h3>${med.name}</h3>
          <p>${med.desc}</p>
          <p class="price">₹${med.price}</p>
          <button onclick="addToCart('${med.name}', ${med.price})">Add to Cart</button>
        `;
        grid.appendChild(card);
      });
    }
    renderMedicines(medicines);

    // Add to Cart — updated: show alert/toast and save to localStorage so billing updates
    function addToCart(name, price) {
      // Build image path (slugify name)
      const slug = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
      const imgPath = `img/medicines/${slug}.jpg`;

      // Add to local memory cart
      cart.push({ name, price, img: imgPath, desc: "" });

      // Update the UI cart on the pharmacy page
      updateCart();

      // Save to localStorage immediately so billing page sees it
      localStorage.setItem('pharmacyCart', JSON.stringify(cart));

      // Debugging log
      console.log('Pharmacy cart saved:', JSON.stringify(cart));

      // Show user feedback: alert (or use a toast)
      alert(`✅ ${name} added to cart and saved to billing.`);
    }

    // Update Cart
    function updateCart() {
      cartList.innerHTML = "";
      let total = 0;
      cart.forEach((item, index) => {
        const li = document.createElement("li");
        li.className = "cart-item";
        li.innerHTML = `
          <div class="item-content">
            <span class="item-text">${item.name} - ₹${item.price}</span>
            <button class="item-remove-btn" onclick="removeItem(${index})" title="Remove this item">✕</button>
          </div>
        `;
        cartList.appendChild(li);
        total += item.price;
      });
      cartTotal.textContent = total;
    }

    // Remove item by index
    function removeItem(index) {
      const removedItem = cart[index];
      cart.splice(index, 1);
      
      updateCart();
      localStorage.setItem('pharmacyCart', JSON.stringify(cart));
      
      alert(`✅ ${removedItem.name} removed from cart!`);
      console.log('Item removed. Updated cart:', JSON.stringify(cart));
    }

    // Select an item in cart (kept for backward compatibility)
    function selectItem(index) {
      selectedItemIndex = selectedItemIndex === index ? null : index;
      updateCart();
      console.log(`Selected item: ${selectedItemIndex !== null ? cart[selectedItemIndex].name : 'None'}`);
    }

    // Remove selected item from cart (kept for backward compatibility)
    function removeSelectedItem() {
      if (selectedItemIndex === null) {
        alert('❌ Please select an item to remove first!');
        return;
      }
      
      const removedItem = cart[selectedItemIndex];
      cart.splice(selectedItemIndex, 1);
      selectedItemIndex = null;
      
      updateCart();
      localStorage.setItem('pharmacyCart', JSON.stringify(cart));
      
      alert(`✅ ${removedItem.name} removed from cart!`);
      console.log('Item removed. Updated cart:', JSON.stringify(cart));
    }

    // Checkout → Save in localStorage
    function checkout() {
  // Save the cart to localStorage
  localStorage.setItem("pharmacyCart", JSON.stringify(cart));

  // Debugging log to verify saved data
  console.log("Pharmacy cart saved to localStorage:", JSON.stringify(cart));

  // Notify the user and navigate to billing.html
  alert("✅ Items added to billing!");
  window.location.href = "billing.html";
}

    // Search
    document.getElementById("searchBar").addEventListener("keyup", function() {
      const query = this.value.toLowerCase();
      const filtered = medicines.filter(med => med.name.toLowerCase().includes(query));
      renderMedicines(filtered);
    });
  </script>
  <!-- Floating Phone Icon -->
  <div class="floating-phone-icon">
    <a href="tel:+919876543210" title="Call Hospital">
      📞
    </a>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .floating-phone-icon {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      animation: pulse 2s infinite;
    }
    .floating-phone-icon a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      color: white;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }
      .floating-phone-icon a:hover {
      transform: scale(1.15);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Cart Items Styling */
    .cart-item {
      padding: 12px;
      margin: 8px 0;
      background: #f0f0f0;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-item:hover {
      background: #e8e8ff;
      transform: translateX(5px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .item-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .item-text {
      flex: 1;
      cursor: default;
      font-weight: 500;
    }

    .item-remove-btn {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .item-remove-btn:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
    }

    .item-remove-btn:active {
      transform: scale(0.95);
    }

    /* Cart Buttons Container */
    .cart-buttons {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .cart-buttons button {
      flex: 1;
      min-width: 150px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .remove-btn {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }

    .remove-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }

    .remove-btn:active {
      transform: translateY(-1px);
    }

    .glow-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .glow-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
  </style>

  <script src="js/language-config.js"></script>
</body>
</html>
