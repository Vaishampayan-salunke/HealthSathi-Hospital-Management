<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Management - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page"
style="margin: 0;
padding: 0;
background: url('img/background_img_1.jpg') no-repeat center center fixed;
  background-size: cover;">

  <div class="login-container">
    <img src="img/logo.png" alt="Hospital Logo" class="logo">

    <h1 class="hospital-name" style="text-align: center; white-space: wrap;">🏥 HealthSathi </h1>
    <p class="tagline">Your Health, Our Priority</p>

    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>

    <div class="login-links">
      <a href="#">New Patient? Register</a> |
      <a href="#">Forgot Password?</a>
    </div>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (user === "admin" && pass === "admin123") {
        window.location.href = "admin.html";  // Admin login
      } else {
        window.location.href = "dashboard.html";  // Patient login
      }
    });
  </script>

  <!-- Floating Phone Icon -->
  <div class="floating-phone-icon">
    <a href="tel:+919876543210" title="Call Hospital">
      📞
    </a>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .floating-phone-icon {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      animation: pulse 2s infinite;
    }
    .floating-phone-icon a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      color: white;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }
    .floating-phone-icon a:hover {
      transform: scale(1.15);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>

  <script src="js/language-config.js"></script>
</body>
</html>
